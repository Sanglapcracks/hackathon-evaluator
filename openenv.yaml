name: hackathon-evaluator
description: >
  A real-world OpenEnv environment for evaluating hackathon project submissions.
  Agents observe structured project metadata, assign a score, and provide feedback.
version: "1.0"

entrypoint: server.app:app

endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  baseline: /baseline
  grader: /grader

observation_space:
  features: list[string]
  has_tests: boolean
  has_docs: boolean
  has_docker: boolean
  stars: integer
  difficulty: string

action_space:
  score: float
  feedback: string

reward:
  type: float
  range: [0.0, 1.0]